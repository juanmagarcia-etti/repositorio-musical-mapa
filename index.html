<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa musical</title>

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; background: #07111f; color: #fff; }
    .app { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }
    .sidebar {
      background: #0d1b2a;
      border-right: 1px solid rgba(255,255,255,.08);
      padding: 20px;
      overflow: auto;
    }
    .sidebar h1 { margin: 0 0 8px; font-size: 1.5rem; }
    .sidebar p { margin: 0 0 18px; color: #b8c4d6; }
    .panel {
      background: #13263a;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat {
      background: rgba(255,255,255,.04);
      border-radius: 12px;
      padding: 12px;
    }
    .stat strong { display: block; font-size: 1.3rem; }
    .stat span { color: #b8c4d6; font-size: .85rem; }

    label { display: block; margin: 0 0 6px; font-size: .9rem; color: #b8c4d6; }
    input, select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.1);
      background: #0c1724;
      color: #fff;
      margin-bottom: 12px;
    }

    #list { display: grid; gap: 10px; }
    .item {
      width: 100%;
      text-align: left;
      background: rgba(255,255,255,.04);
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
    }
    .item:hover, .item.active { border-color: #53c8ff; background: rgba(83,200,255,.09); }
    .item strong { display: block; margin-bottom: 4px; }
    .item small { display: block; color: #b8c4d6; }

    .map-wrap { position: relative; min-height: 100vh; }
    #map { width: 100%; height: 100vh; background: #000; }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(83,200,255,.12);
      color: #7fdbff;
      font-size: .82rem;
      margin-top: 4px;
    }

    .meta { color: #b8c4d6; font-size: .85rem; }
    .error { color: #ff8d8d; }
    .ok { color: #8ef0a7; }

    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: #102033;
      color: #fff;
    }
    .popup img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #0a1320;
    }
    .popup h3 { margin: 0 0 6px; }
    .popup p { margin: 0 0 8px; color: #c4d0df; }
    .popup a { color: #7fdbff; text-decoration: none; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      #map { height: 70vh; }
      .map-wrap { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Mapa musical</h1>
      <p>Conectado en directo con Google Sheets.</p>

      <section class="panel">
        <div class="stats">
          <div class="stat"><strong id="totalCount">0</strong><span>Entradas</span></div>
          <div class="stat"><strong id="visibleCount">0</strong><span>Visibles</span></div>
          <div class="stat"><strong id="countryCount">0</strong><span>Países</span></div>
          <div class="stat"><strong id="genreCount">0</strong><span>Géneros</span></div>
        </div>
      </section>

      <section class="panel">
        <label for="search">Buscar</label>
        <input id="search" type="search" placeholder="Grupo, disco, ciudad, país..." />

        <label for="genreFilter">Género</label>
        <select id="genreFilter">
          <option value="">Todos</option>
        </select>

        <label for="countryFilter">País</label>
        <select id="countryFilter">
          <option value="">Todos</option>
        </select>

        <div class="meta" id="statusText">Cargando datos…</div>
        <div class="badge">Autoactualización cada 60 segundos</div>
      </section>

      <section class="panel">
        <div id="list"></div>
      </section>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7PcVBXTAc-6_iOrEgSIApwYRnC-FUw5ydQ8iLbOVGBNTtBb4fjnGkh-8Ixsy6oda8_znepL1B4uD2/pubhtml";
    const REFRESH_MS = 60000;

    const state = {
      rows: [],
      filtered: [],
      markers: [],
      activeId: null
    };

    const els = {
      search: document.getElementById("search"),
      genreFilter: document.getElementById("genreFilter"),
      countryFilter: document.getElementById("countryFilter"),
      list: document.getElementById("list"),
      statusText: document.getElementById("statusText"),
      totalCount: document.getElementById("totalCount"),
      visibleCount: document.getElementById("visibleCount"),
      countryCount: document.getElementById("countryCount"),
      genreCount: document.getElementById("genreCount")
    };

    const map = L.map("map", { worldCopyJump: true }).setView([20, 0], 2);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(v => v.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length || row.length) {
        row.push(cell);
        if (row.some(v => v.trim() !== "")) rows.push(row);
      }

      const headers = rows.shift().map(h => h.trim());

      return rows.map((cols, index) => {
        const obj = { __id: index };
        headers.forEach((header, i) => obj[header] = (cols[i] || "").trim());
        return obj;
      });
    }

    function normalizeRows(rows) {
      return rows
        .map((row, i) => ({
          id: `${row.grupo || "item"}-${i}`,
          grupo: row.grupo || "",
          pais: row.pais || "",
          ciudad: row.ciudad || "",
          genero: row.genero || "",
          disco: row.disco_clave || "",
          youtube: row.youtube_music || "",
          portada: row.portada || "",
          lat: parseFloat(String(row.lat || "").replace(",", ".")),
          lon: parseFloat(String(row.lon || "").replace(",", "."))
        }))
        .filter(row => row.grupo && Number.isFinite(row.lat) && Number.isFinite(row.lon));
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "es"));
    }

    function fillSelect(select, values) {
      const current = select.value;
      select.innerHTML = '<option value="">Todos</option>';
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
      select.value = values.includes(current) ? current : "";
    }

    function popupHTML(row) {
      const cover = row.portada
        ? `<img src="${row.portada}" alt="Portada de ${row.disco || row.grupo}" loading="lazy">`
        : "";

      const link = row.youtube
        ? `<a href="${row.youtube}" target="_blank" rel="noopener noreferrer">Escuchar en YouTube Music</a>`
        : "";

      return `
        <div class="popup">
          ${cover}
          <h3>${row.grupo}</h3>
          <p>${[row.ciudad, row.pais].filter(Boolean).join(", ")}</p>
          <p>${[row.genero, row.disco].filter(Boolean).join(" · ")}</p>
          ${link}
        </div>
      `;
    }

    function renderMarkers(rows) {
      markerLayer.clearLayers();
      state.markers = [];

      rows.forEach(row => {
        const marker = L.marker([row.lat, row.lon]).bindPopup(popupHTML(row));
        marker.on("click", () => setActive(row.id));
        marker.addTo(markerLayer);
        state.markers.push({ id: row.id, row, marker });
      });

      if (rows.length === 1) {
        map.setView([rows[0].lat, rows[0].lon], 6);
      } else if (rows.length > 1) {
        map.fitBounds(L.latLngBounds(rows.map(r => [r.lat, r.lon])).pad(0.2));
      }
    }

    function renderList(rows) {
      els.list.innerHTML = "";
      rows.forEach(row => {
        const btn = document.createElement("button");
        btn.className = "item" + (state.activeId === row.id ? " active" : "");
        btn.innerHTML = `
          <strong>${row.grupo}</strong>
          <small>${[row.ciudad, row.pais].filter(Boolean).join(", ")}</small>
          <small>${[row.genero, row.disco].filter(Boolean).join(" · ")}</small>
        `;
        btn.addEventListener("click", () => focusRow(row.id));
        els.list.appendChild(btn);
      });
    }

    function updateStats(allRows, visibleRows) {
      els.totalCount.textContent = allRows.length;
      els.visibleCount.textContent = visibleRows.length;
      els.countryCount.textContent = uniqueSorted(allRows.map(r => r.pais)).length;
      els.genreCount.textContent = uniqueSorted(allRows.map(r => r.genero)).length;
    }

    function setActive(id) {
      state.activeId = id;
      renderList(state.filtered);
    }

    function focusRow(id) {
      const entry = state.markers.find(m => m.id === id);
      if (!entry) return;
      setActive(id);
      map.setView([entry.row.lat, entry.row.lon], Math.max(map.getZoom(), 5));
      entry.marker.openPopup();
    }

    function applyFilters() {
      const term = els.search.value.trim().toLowerCase();
      const genre = els.genreFilter.value;
      const country = els.countryFilter.value;

      state.filtered = state.rows.filter(row => {
        const haystack = [row.grupo, row.pais, row.ciudad, row.genero, row.disco].join(" ").toLowerCase();
        return (!term || haystack.includes(term)) &&
               (!genre || row.genero === genre) &&
               (!country || row.pais === country);
      });

      updateStats(state.rows, state.filtered);
      renderList(state.filtered);
      renderMarkers(state.filtered);

      els.statusText.className = "meta ok";
      els.statusText.textContent = `Última actualización: ${new Date().toLocaleString("es-ES")}`;
    }

    async function loadSheet() {
      try {
        els.statusText.className = "meta";
        els.statusText.textContent = "Actualizando datos…";

        const res = await fetch(`${SHEET_CSV_URL}&t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const text = await res.text();
        const rows = normalizeRows(parseCSV(text));

        state.rows = rows;

        fillSelect(els.genreFilter, uniqueSorted(rows.map(r => r.genero)));
        fillSelect(els.countryFilter, uniqueSorted(rows.map(r => r.pais)));

        applyFilters();
      } catch (error) {
        console.error(error);
        els.statusText.className = "meta error";
        els.statusText.textContent = "No se pudieron cargar los datos del Sheet. Publica la hoja para acceso web.";
      }
    }

    els.search.addEventListener("input", applyFilters);
    els.genreFilter.addEventListener("change", applyFilters);
    els.countryFilter.addEventListener("change", applyFilters);

    loadSheet();
    setInterval(loadSheet, REFRESH_MS);
  </script>
</body>
</html>
